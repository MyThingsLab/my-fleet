name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "dev-ledger/**"]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
    paths-ignore: ["**.md", "dev-ledger/**"]

# Supersede in-flight runs when an agent pushes again to the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Skip while a PR is a draft; always run on pushes to main.
    if: ${{ github.event_name == 'push' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # This repo's only real deps beyond my-things-core are sibling repos
      # from the same owner (not on PyPI): the orchestrator, the merge guard,
      # the Telegram transport used by the ASK channel, and the worker CLI
      # fleet_dispatch shells out to. my-things-core and my-guard are v1
      # (pinned per RELEASE.md); my-orchestrator, my-telegram-bot, and
      # my-coder are still v0 and float on @main.
      - name: Install
        run: |
          pip install "my-things-core @ git+https://github.com/${{ github.repository_owner }}/my-things-core@v1.0.0"
          # --no-deps: its only dep is the core installed above, but its main
          # still names it "mythings-core" (pre-rename) which pip can't resolve.
          pip install --no-deps "my-orchestrator @ git+https://github.com/${{ github.repository_owner }}/my-orchestrator@main"
          # merge_ready_prs.py routes every merge through MyGuard's pr-merge ASK
          # rule, so the guard is a real dependency of this repo's scripts now.
          pip install --no-deps "my-guard @ git+https://github.com/${{ github.repository_owner }}/my-guard@v1.0.0"
          # notify_usage.py / notify_systemd_status.py import mytelegrambot.transport;
          # --no-deps for the same pre-rename-metadata reason as my-orchestrator.
          pip install --no-deps "my-telegram-bot @ git+https://github.com/${{ github.repository_owner }}/my-telegram-bot@main"
          # fleet_dispatch.py shells out to the `mycoder` CLI as the worker
          # role instead of spawning its own inline session.
          pip install --no-deps "my-coder @ git+https://github.com/${{ github.repository_owner }}/my-coder@main"
          pip install -e ".[dev]"
      - name: Ruff
        run: ruff check src tests
      # test_integration_reporter.py is deliberately absent: it needs sibling
      # checkouts (run locally via fleet_test.py --include-slow).
      - name: Tests
        run: pytest tests --ignore=tests/test_integration_reporter.py
